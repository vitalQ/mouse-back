name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Build app bundle
        run: scripts/package-app.sh

      - name: Create app archive
        run: |
          cd dist
          ditto -c -k --keepParent MouseBack.app MouseBack.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseBack.app
          path: dist/MouseBack.app.zip
